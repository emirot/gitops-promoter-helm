name: Backfill Helm Repo Index

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  backfill-index:
    name: Regenerate index.yaml from docs/
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.1
        with:
          ref: gh-pages

      - name: Regenerate index.yaml with correct URLs
        run: |
          set -ex
          helm repo index docs/ --url https://argoproj-labs.github.io/gitops-promoter-helm/
          echo "Regenerated index.yaml:"
          grep -A1 "^\s*urls:" docs/index.yaml

      - name: Commit and push fixed index.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.yaml
          git diff --cached --quiet && echo "No changes needed" && exit 0
          git commit -m "fix: regenerate index.yaml with correct chart URLs"
          git push origin gh-pages

      - name: Open cleanup PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const workflowPath = '.github/workflows/backfill-index.yaml';
            const cleanupBranch = 'chore/remove-backfill-index-workflow';

            // Resolve the default branch's HEAD SHA
            const { data: defaultBranchRef } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'heads/' + context.payload.repository.default_branch,
            });
            const baseSha = defaultBranchRef.object.sha;

            // Create a new branch for the cleanup PR
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/heads/${cleanupBranch}`,
              sha: baseSha,
            });

            // Get the current file SHA so we can delete it
            const { data: fileData } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: workflowPath,
              ref: cleanupBranch,
            });

            // Delete the workflow file on the new branch
            await github.rest.repos.deleteFile({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: workflowPath,
              message: 'chore: remove one-time backfill-index workflow',
              sha: fileData.sha,
              branch: cleanupBranch,
            });

            // Open the cleanup PR
            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'chore: remove one-time backfill-index workflow',
              body: [
                'The `backfill-index.yaml` workflow was a one-time cleanup to fix broken `docs/`-prefixed URLs in `index.yaml`.',
                'It has been run successfully and can now be removed.',
              ].join('\n\n'),
              head: cleanupBranch,
              base: context.payload.repository.default_branch,
            });
